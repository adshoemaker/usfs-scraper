# .github/workflows/daily-scrape.yml
name: USFS Project Scraper
on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      full_scrape:
        description: 'Force full scrape including completed projects (yes/no)'
        required: false
        default: 'no'
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: projects.db
          key: projects-db
          restore-keys: projects-db
      - name: Restore page hash cache
        uses: actions/cache@v4
        with:
          path: page_hashes.json
          key: page-hashes
          restore-keys: page-hashes
      - name: Run scraper
        env:
          SCRAPE_MODE: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.full_scrape == 'yes') && 'full' || '' }}
        run: python scraper.py
      - name: Save database cache
        uses: actions/cache@v4
        with:
          path: projects.db
          key: projects-db
      - name: Save page hash cache
        uses: actions/cache@v4
        with:
          path: page_hashes.json
          key: page-hashes
      - name: Commit updated projects.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .
          git add projects.json
          git diff --staged --quiet || git commit -m "Scrape: $(date -u '+%Y-%m-%d')"
          git push origin HEAD:main
