# .github/workflows/daily-scrape.yml
# ---------------------------------------------------------------
# Schedule:
#   Monday      — full scrape including completed projects + milestones
#   Tue & Fri   — active projects + fresh milestones, skip completed
#   Wed/Thu/Sat/Sun — lightweight: new projects only, skip completed,
#                     hash cache skips unchanged forests
#
# Manual trigger available from Actions tab with optional full fetch.
# ---------------------------------------------------------------
name: USFS Project Scraper
on:
  schedule:
    - cron: "0 14 * * *"   # Daily at 6:00am Pacific (14:00 UTC)
  workflow_dispatch:
    inputs:
      full_scrape:
        description: 'Force full scrape including completed projects (yes/no)'
        required: false
        default: 'no'
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: projects.db
          key: projects-db
          restore-keys: projects-db
      - name: Restore page hash cache
        uses: actions/cache@v4
        with:
          path: page_hashes.json
          key: page-hashes
          restore-keys: page-hashes
      - name: Run scraper (with retries)
        env:
          SCRAPE_MODE: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.full_scrape == 'yes') && 'full' || '' }}
        run: |
          for attempt in 1 2 3; do
            echo "=== Scraper attempt $attempt of 3 ==="
            python scraper.py && break
            if [ $attempt -lt 3 ]; then
              echo "Scraper failed, waiting 60s before retry..."
              sleep 60
            else
              echo "All 3 attempts failed."
              exit 1
            fi
          done
      - name: Save database cache
        uses: actions/cache@v4
        with:
          path: projects.db
          key: projects-db
      - name: Save page hash cache
        uses: actions/cache@v4
        with:
          path: page_hashes.json
          key: page-hashes
      - name: Commit updated projects.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp projects.json /tmp/projects.json
          git fetch origin main
          git checkout -f origin/main
          git checkout -b scrape-update
          cp /tmp/projects.json projects.json
          git add projects.json
          git diff --staged --quiet || git commit -m "Scrape: $(date -u '+%Y-%m-%d')"
          git push origin scrape-update:main --force-with-lease=refs/remotes/origin/main
